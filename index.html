<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Always Arya — Romantic</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Top App Bar -->
  <header class="topbar">
    <div class="left">
      <div class="avatar-icon"></div>
      <div class="title">Always Arya</div>
    </div>
    <div class="right">
      <button id="enterBtn" class="icon-btn" title="Enter / Play">⟳</button>
    </div>
  </header>

  <!-- Fullscreen intro overlay (Enter + Play) -->
  <div id="intro" class="intro">
    <button id="startBtn" class="start-btn" aria-label="Enter and Play">
      <span class="play">▶</span>
      <span class="text">Enter & Play</span>
    </button>
    <p class="hint">Tap to enter and start the melody</p>
    <audio id="bgAudio" src="assets/romantic.mp3" preload="auto" loop></audio>
  </div>

  <!-- Main content -->
  <main id="app" class="app hidden">
    <!-- Background image layer (auto-sync via theme) -->
    <div class="bg-layer" id="bgLayer"></div>

    <!-- Petal container -->
    <div id="petalContainer" class="petal-container" aria-hidden="true"></div>

    <!-- Center stage -->
    <section class="stage">
      <!-- floating thumbnails -->
      <div class="thumb thumb-1"><img src="" alt="thumb"/></div>
      <div class="thumb thumb-2"><img src="" alt="thumb"/></div>
      <div class="thumb thumb-3"><img src="" alt="thumb"/></div>
      <div class="thumb thumb-4"><img src="" alt="thumb"/></div>
      <div class="thumb thumb-5"><img src="" alt="thumb"/></div>

      <!-- Neon heart -->
      <div class="heart-wrap">
        <div class="neon-heart"></div>
        <div class="heart-text" contenteditable="true" id="heartText">Hey Arya<br/>Happy Valentine's Day</div>
      </div>
    </section>

    <!-- Floating music control (bottom-right) -->
    <button id="playToggle" class="music-btn" aria-label="Play/Pause">⏸</button>

    <!-- Bottom overlay: page controls & inputs (collapsed on mobile) -->
    <footer class="bottom-controls">
      <div class="controls-left">
        <button id="prevBtn" class="small">‹</button>
        <button id="nextBtn" class="small">›</button>
        <div class="dots" id="dots"></div>
      </div>
      <div class="controls-right">
        <input id="bgKeyword" placeholder="Background keyword (roses, moonlight)" />
        <button id="applyBgBtn" class="small">Apply</button>
                <button id="resetBtn" class="small ghost">Reset</button>
      </div>
    </footer>

    <!-- Hidden pages (4 pages + the 5th appears after Yes) -->
    <div id="pagesContainer" class="pages hidden">
      <!-- Each page is editable and has GIF input and Yes/No -->
      <section class="page" data-index="1" data-theme="roses,romantic">
        <h3 contenteditable="true" class="page-title">To my love</h3>
        <p contenteditable="true" class="page-desc">Write something sweet here.</p>
        <div class="gif-area">
          <input class="gif-url" placeholder="Paste GIF URL..." />
          <button class="add-gif-btn">Add GIF</button>
          <div class="gif-preview"><img src="" alt="gif"/></div>
          <div class="gif-actions">
            <button class="yes-btn">Yes</button>
            <button class="no-btn">No</button>
          </div>
        </div>
      </section>

      <section class="page" data-index="2" data-theme="moonlight,roses">
        <h3 contenteditable="true" class="page-title">Moonlit Whispers</h3>
        <p contenteditable="true" class="page-desc">A short memory.</p>
        <div class="gif-area">
          <input class="gif-url" placeholder="Paste GIF URL..." />
          <button class="add-gif-btn">Add GIF</button>
          <div class="gif-preview"><img src="" alt="gif"/></div>
          <div class="gif-actions">
            <button class="yes-btn">Yes</button>
            <button class="no-btn">No</button>
          </div>
        </div>
      </section>

      <section class="page" data-index="3" data-theme="candlelight,romantic">
        <h3 contenteditable="true" class="page-title">Sweet Moments</h3>
        <p contenteditable="true" class="page-desc">Add your lines.</p>
        <div class="gif-area">
          <input class="gif-url" placeholder="Paste GIF URL..." />
          <button class="add-gif-btn">Add GIF</button>
          <div class="gif-preview"><img src="" alt="gif"/></div>
          <div class="gif-actions">
            <button class="yes-btn">Yes</button>
            <button class="no-btn">No</button>
          </div>
        </div>
      </section>

      <section class="page" data-index="4" data-theme="petals,roses">
        <h3 contenteditable="true" class="page-title">Promise</h3>
        <p contenteditable="true" class="page-desc">A promise for her.</p>
        <div class="gif-area">
          <input class="gif-url" placeholder="Paste GIF URL..." />
          <button class="add-gif-btn">Add GIF</button>
          <div class="gif-preview"><img src="" alt="gif"/></div>
          <div class="gif-actions">
            <button class="yes-btn">Yes</button>
            <button class="no-btn special-no" id="floatingNo">No</button>
          </div>
        </div>
      </section>

      <!-- Page 5 appears when Yes clicked -->
      <section class="page hidden" id="page5" data-index="5" data-theme="celebrate">
        <h3 class="page-title">You said yes 💖</h3>
        <p contenteditable="true" class="page-desc">This is our special page.</p>
        <div class="gif-preview final"><img src="" alt="final gif"/></div>
        <p contenteditable="true" class="final-text">Write your final message here.</p>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
